name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check backend/

  security:
    name: Security Scan (bandit + safety)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety

      - name: Run bandit (source code security scan)
        run: |
          bandit -r backend/ \
            --exclude backend/.venv \
            -ll \
            --format txt

      - name: Install project dependencies for safety check
        run: pip install -r requirements.txt

      - name: Run safety (dependency vulnerability scan)
        run: safety check --full-report

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov httpx

      - name: Run pytest with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci-only
        run: |
          pytest backend/ \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error

      - name: Confirm deploy triggered
        run: echo "Deploy triggered successfully. Check Render dashboard for status."